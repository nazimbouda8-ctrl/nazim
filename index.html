<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Life Style Pointage</title>

<!-- PWA DIRECT (sans fichier json externe) -->
<meta name="theme-color" content="#FFD700">

<link rel="manifest" href='data:application/json,{
"name":"Life Style Pointage",
"short_name":"LS",
"start_url":".",
"display":"standalone",
"background_color":"#000000",
"theme_color":"#FFD700",
"icons":[{"src":"logo.png","sizes":"192x192","type":"image/png"}]
}'>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#000000,#1a1a1a);
    color:#FFD700;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.main-box{
    width:100%;
    max-width:420px;
    background:#111;
    padding:35px;
    border-radius:25px;
    border:2px solid #FFD700;
    box-shadow:0 0 20px rgba(255,215,0,0.4);
    text-align:center;
}

.logo-box{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    margin-bottom:25px;
}

.logo{
    width:95px;
    height:95px;
    border:2px solid #FFD700;
    border-radius:18px;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.logo h1{
    font-size:42px;
    color:#FFD700;
}

.logo p{
    font-size:12px;
    color:#FFD700;
}

input{
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:12px;
    background:#1f1f1f;
    color:#FFD700;
    border:1px solid #FFD700;
}

button{
    width:100%;
    padding:14px;
    margin-top:12px;
    border-radius:12px;
    background:#FFD700;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    border:none;
}

button:hover{
    background:#ffea4d;
}

ul{
    list-style:none;
    margin-top:15px;
}

li{
    background:#1a1a1a;
    border:1px solid #FFD700;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
}

.creator{
    margin-top:30px;
    font-size:14px;
    opacity:0.8;
}

</style>
</head>

<body>

<div class="main-box">

<div class="logo-box">
<div class="logo">
    <h1>LS</h1>
    <p>LIFESTYLE</p>
</div>
<div>Connexion Employé</div>
</div>

<input type="text" id="username" placeholder="Nom">
<input type="password" id="password" placeholder="Mot de passe">

<button onclick="login()">Se connecter</button>
<button onclick="adminLogin()">Connexion Patron</button>

<div id="app" style="display:none;">

    <h3 id="welcome"></h3>

    <button onclick="pointage()">📍 Pointage (Entrée)</button>
    <button onclick="depointage()">🚪 Dépointage (Sortie)</button>

    <h4>Historique</h4>
    <ul id="list"></ul>

</div>

<div id="adminPanel" style="display:none;">

    <h2>Panel Patron</h2>

    <button onclick="resetAllData()">🗑 Reset</button>

    <div id="adminData"></div>

</div>

<div class="creator">— created by nazim bouda —</div>

</div>

<script>

/* USERS */
const users = {
    "nazim": "202601",
    "Ilyes": "202602",
    "Alilou": "202603",
    "Anas": "202604"
};

const adminName = "airouche";
const adminPassword = "010167";

let currentUser = "";

/* LOGIN EMPLOYE */
function login(){

    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    if(users[u] === p){

        currentUser = u;

        document.getElementById("app").style.display = "block";
        document.getElementById("adminPanel").style.display = "none";

        document.getElementById("welcome").innerText =
        "Bienvenue " + u;

        loadData();

    } else {
        alert("Erreur login !");
    }
}

/* LOGIN ADMIN */
function adminLogin(){

    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    if(u === adminName && p === adminPassword){

        document.getElementById("adminPanel").style.display = "block";
        document.getElementById("app").style.display = "none";

        loadAdminData();

    } else {
        alert("Admin incorrect !");
    }
}

/* POINTAGE */
function pointage(){

    let now = new Date();
    localStorage.setItem(currentUser+"_start", now.toISOString());

    alert("Entrée: " + now.toLocaleString());
}

/* DEPOINTAGE */
function depointage(){

    let start = localStorage.getItem(currentUser+"_start");

    if(!start){
        alert("Pas de pointage !");
        return;
    }

    let s = new Date(start);
    let e = new Date();

    let hours = (e - s)/3600000;

    let data = JSON.parse(localStorage.getItem(currentUser)) || [];

    data.push({
        start: s.toLocaleString(),
        end: e.toLocaleString(),
        hours: hours.toFixed(2)
    });

    localStorage.setItem(currentUser, JSON.stringify(data));
    localStorage.removeItem(currentUser+"_start");

    loadData();

    alert("Sortie enregistrée !");
}

/* HISTORIQUE */
function loadData(){

    let list = document.getElementById("list");
    list.innerHTML = "";

    let data = JSON.parse(localStorage.getItem(currentUser)) || [];

    data.forEach(e=>{

        let li = document.createElement("li");

        li.innerHTML =
        "Début: "+e.start+
        "<br>Fin: "+e.end+
        "<br><b>"+e.hours+" h</b>";

        list.appendChild(li);
    });
}

/* ADMIN */
function loadAdminData(){

    let div = document.getElementById("adminData");
    div.innerHTML = "";

    for(let u in users){

        let data = JSON.parse(localStorage.getItem(u)) || [];

        let total = 0;

        data.forEach(e=>{
            total += Number(e.hours);
        });

        div.innerHTML += `
            <h3>${u}</h3>
            <p>Total: ${total.toFixed(2)} h</p>
            <hr>
        `;
    }
}

/* RESET */
function resetAllData(){

    if(confirm("Tout supprimer ?")){

        for(let u in users){
            localStorage.removeItem(u);
            localStorage.removeItem(u+"_start");
        }

        loadAdminData();
        alert("Reset terminé !");
    }
}

/* SERVICE WORKER ULTRA SIMPLE */
if('serviceWorker' in navigator){
    navigator.serviceWorker.register(
        URL.createObjectURL(new Blob([`
            self.addEventListener('fetch', e=>{});
        `], {type:'application/javascript'}))
    );
}

</script>

</body>
</html>
