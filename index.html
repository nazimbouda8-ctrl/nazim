<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pointage Life Style</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background-color: #000;
    color: #FFD700;
}

input, button {
    margin: 5px;
    padding: 10px;
    border-radius: 5px;
    border: none;
}

input {
    background-color: #111;
    color: #FFD700;
    border: 1px solid #FFD700;
}

button {
    background-color: #FFD700;
    color: #000;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background-color: #e6c200;
}

#app {
    margin-top: 20px;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    background-color: #111;
    margin: 5px auto;
    padding: 8px;
    width: 250px;
    border: 1px solid #FFD700;
    border-radius: 5px;
}
</style>

</head>

<body>

<h2>Connexion Employé</h2>

<input type="text" id="username" placeholder="Nom"><br>
<input type="password" id="password" placeholder="Mot de passe"><br>
<button onclick="login()">Se connecter</button>

<div id="app" style="display:none;">
    <h3 id="welcome"></h3>

    <input type="date" id="date"><br>
    <input type="number" id="hours" placeholder="Heures travaillées"><br>

    <button onclick="addEntry()">Ajouter</button>
    <button onclick="resetForm()">Nouveau pointage</button>

    <h4>Historique</h4>
    <ul id="list"></ul>
</div>

<script>
const users = {
    "nazim": "202601",
    "Ilyes": "202602",
    "Alilou": "202603",
    "Anas": "202604"
};

let currentUser = "";

function login() {
    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    if (users[u] === p) {
        currentUser = u;
        document.getElementById("app").style.display = "block";
        document.getElementById("welcome").innerText = "Bienvenue " + u;
        loadData();
    } else {
        alert("Erreur mot de passe !");
    }
}

function addEntry() {
    let date = document.getElementById("date").value;
    let hours = document.getElementById("hours").value;

    let data = JSON.parse(localStorage.getItem(currentUser)) || [];
    data.push({ date, hours });

    localStorage.setItem(currentUser, JSON.stringify(data));
    loadData();
}

function resetForm() {
    document.getElementById("date").value = "";
    document.getElementById("hours").value = "";
}

function loadData() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    let data = JSON.parse(localStorage.getItem(currentUser)) || [];

    data.forEach(e => {
        let li = document.createElement("li");
        li.innerText = e.date + " - " + e.hours + "h";
        list.appendChild(li);
    });
}
</script>

</body>
</html>
