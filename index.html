<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Life Style Pointage</title>

<meta name="theme-color" content="#FFD700">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#000,#1a1a1a);
color:#FFD700;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.main{
width:100%;
max-width:450px;
background:#0f0f0f;
border:2px solid #FFD700;
border-radius:25px;
padding:25px;
box-shadow:0 0 25px rgba(255,215,0,0.4);
text-align:center;
}

.title{
font-size:34px;
font-weight:bold;
margin-bottom:10px;
text-shadow:0 0 10px #FFD700;
}

.subtitle{
font-size:14px;
opacity:0.8;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #FFD700;
background:#1a1a1a;
color:#FFD700;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
background:#FFD700;
color:#000;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#ffea70;
transform:scale(1.02);
}

.card{
background:#111;
border:1px solid #FFD700;
border-radius:15px;
padding:15px;
margin-top:10px;
box-shadow:0 0 10px rgba(255,215,0,0.2);
}

h2{
margin-top:15px;
}

ul{
list-style:none;
margin-top:10px;
}

li{
background:#1a1a1a;
border:1px solid #FFD700;
padding:10px;
margin-top:8px;
border-radius:10px;
font-size:13px;
}

.big{
font-size:20px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="main">

<div class="title">✨ Life Style ✨</div>
<div class="subtitle">Système de pointage employé</div>

<input id="user" placeholder="Nom">
<input id="pass" type="password" placeholder="Mot de passe">

<button id="btnLogin">Connexion Employé</button>
<button id="btnAdmin">Connexion Patron</button>

<div id="employee" style="display:none;">

<h2 id="welcome"></h2>

<div class="card">
<div class="big">Heures : <span id="hours">0</span> h</div>
<div class="big">Salaire : <span id="salary">0</span> DA</div>
</div>

<button id="btnStart">📍 Entrée</button>
<button id="btnEnd">🚪 Sortie</button>

<h2>Historique</h2>
<ul id="history"></ul>

</div>

<div id="admin" style="display:none;">

<h2>Panel Patron</h2>

<div id="adminData"></div>

<button id="btnReset">🗑 Reset tout</button>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, get, child, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

// Ta configuration Firebase transmise
const firebaseConfig = {
  apiKey: "AIzaSyDtkWf9ns8COymh_kh8wJzwxODp-HQ3weI",
  authDomain: "lifestylepointage.firebaseapp.com",
  databaseURL: "https://lifestylepointage-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lifestylepointage",
  storageBucket: "lifestylepointage.firebasestorage.app",
  messagingSenderId: "816860536305",
  appId: "1:816860536305:web:a16078d630276470323850"
};

// Initialisation de Firebase et de la base de données
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const users = {
  "nazim": "202601",
  "alilou": "202602",
  "anas": "202603",
  "ilyes": "202604",
  "Amine": "202605"
};

const adminUser = "airouche";
const adminPass = "010167";

let current = "";

// Fonctions de connexion
async function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if (users[u] == p) {
    current = u;
    document.getElementById("employee").style.display = "block";
    document.getElementById("admin").style.display = "none";
    document.getElementById("welcome").innerText = "Bienvenue " + u;
    await load();
  } else {
    alert("Erreur login");
  }
}

async function admin() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if (u == adminUser && p == adminPass) {
    document.getElementById("admin").style.display = "block";
    document.getElementById("employee").style.display = "none";
    await loadAdmin();
  } else {
    alert("Admin incorrect");
  }
}

// Actions Employé (Écritures Firebase)
async function start() {
  try {
    await set(ref(db, 'starts/' + current), Date.now());
    alert("Entrée enregistrée");
  } catch (error) {
    alert("Erreur Firebase : " + error.message);
  }
}

async function end() {
  try {
    const startSnapshot = await get(ref(db, 'starts/' + current));
    let s = startSnapshot.val();

    if (!s) {
      alert("Pas d'entrée");
      return;
    }

    let startTime = new Date(parseInt(s));
    let endTime = new Date();
    let h = (endTime - startTime) / 3600000;

    const dataSnapshot = await get(ref(db, 'history/' + current));
    let data = dataSnapshot.val() || [];

    data.push({
      start: startTime.toLocaleString(),
      end: endTime.toLocaleString(),
      hours: h.toFixed(2)
    });

    // On met à jour l'historique et supprime le marqueur de début
    await set(ref(db, 'history/' + current), data);
    await remove(ref(db, 'starts/' + current));

    alert("Sortie enregistrée");
    await load();
  } catch (error) {
    alert("Erreur : " + error.message);
  }
}

// Chargement des données de l'employé connecté
async function load() {
  try {
    const snapshot = await get(ref(db, 'history/' + current));
    let data = snapshot.val() || [];

    let total = 0;
    let list = document.getElementById("history");
    list.innerHTML = "";

    data.forEach(e => {
      total += Number(e.hours);
      let li = document.createElement("li");
      li.innerHTML = `Début: ${e.start}<br>Fin: ${e.end}<br><b>${e.hours} h</b>`;
      list.appendChild(li);
    });

    document.getElementById("hours").innerText = total.toFixed(2);
    document.getElementById("salary").innerText = (total * 100).toFixed(0);
  } catch (error) {
    console.error(error);
  }
}

// Chargement du panel Admin
async function loadAdmin() {
  try {
    let div = document.getElementById("adminData");
    div.innerHTML = "";

    for (let u in users) {
      const snapshot = await get(ref(db, 'history/' + u));
      let data = snapshot.val() || [];

      let total = 0;
      data.forEach(e => {
        total += Number(e.hours);
      });

      div.innerHTML += `
        <div class="card">
          <h3>${u}</h3>
          <p>Heures: ${total.toFixed(2)} h</p>
          <p>Salaire: ${(total * 100).toFixed(0)} DA</p>
        </div>
      `;
    }
  } catch (error) {
    console.error(error);
  }
}

// Reset complet (Efface les données de l'arbre Firebase)
async function reset() {
  if (confirm("Tout supprimer ?")) {
    try {
      for (let u in users) {
        await remove(ref(db, 'history/' + u));
        await remove(ref(db, 'starts/' + u));
      }
      await loadAdmin();
      alert("Reset terminé");
    } catch (error) {
      alert("Erreur lors du reset : " + error.message);
    }
  }
}

// Lier les boutons aux fonctions (Obligatoire à cause du mode module isolé)
document.getElementById("btnLogin").addEventListener("click", login);
document.getElementById("btnAdmin").addEventListener("click", admin);
document.getElementById("btnStart").addEventListener("click", start);
document.getElementById("btnEnd").addEventListener("click", end);
document.getElementById("btnReset").addEventListener("click", reset);

</script>

</body>
</html>
