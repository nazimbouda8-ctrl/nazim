<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pointage Life Style</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#000000,#1a1a1a);
    color:#FFD700;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.main-box{
    width:100%;
    max-width:420px;
    background:#111;
    padding:35px;
    border-radius:25px;
    border:2px solid #FFD700;
    box-shadow:
    0 0 20px rgba(255,215,0,0.4),
    0 0 40px rgba(255,215,0,0.2);
    animation:fadeIn 0.8s ease;
    text-align:center;
}

h2,h3,h4{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#1f1f1f;
    color:#FFD700;
    border:1px solid #FFD700;
    transition:0.3s;
    font-size:15px;
}

input:focus{
    transform:scale(1.02);
    box-shadow:0 0 10px #FFD700;
}

button{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    background:#FFD700;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    font-size:15px;
}

button:hover{
    transform:translateY(-2px) scale(1.02);
    background:#ffea4d;
    box-shadow:0 0 15px #FFD700;
}

ul{
    list-style:none;
    margin-top:15px;
    padding:0;
}

li{
    background:#1a1a1a;
    border:1px solid #FFD700;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
    animation:slideUp 0.4s ease;
}

hr{
    margin-top:15px;
    border:1px solid #FFD700;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:500px){

    .main-box{
        padding:25px;
        border-radius:20px;
    }

    h2{
        font-size:24px;
    }

    input,button{
        font-size:14px;
        padding:12px;
    }

}

</style>
</head>

<body>

<div class="main-box">

<h2>Connexion Employé</h2>

<input type="text" id="username" placeholder="Nom">
<input type="password" id="password" placeholder="Mot de passe">

<button onclick="login()">Se connecter</button>
<button onclick="adminLogin()">Connexion Patron</button>

<div id="app" style="display:none;">

    <h3 id="welcome"></h3>

    <input type="date" id="date">
    <input type="number" id="hours" placeholder="Heures travaillées">

    <button onclick="addEntry()">Ajouter</button>
    <button onclick="resetForm()">Nouveau pointage</button>

    <h4>Historique</h4>

    <ul id="list"></ul>

</div>

<div id="adminPanel" style="display:none;">

    <h2>Panel Patron</h2>

    <div id="adminData"></div>

</div>

</div>

<script>

const users = {
    "nazim": "202601",
    "Ilyes": "202602",
    "Alilou": "202603",
    "Anas": "202604"
};

const adminName = "airouche";
const adminPassword = "010167";

let currentUser = "";

function login() {

    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    if (users[u] === p) {

        currentUser = u;

        document.getElementById("app").style.display = "block";
        document.getElementById("adminPanel").style.display = "none";

        document.getElementById("welcome").innerText =
        "Bienvenue " + u;

        loadData();

    } else {

        alert("Erreur mot de passe !");
    }
}

function adminLogin() {

    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    if (u === adminName && p === adminPassword) {

        document.getElementById("adminPanel").style.display = "block";
        document.getElementById("app").style.display = "none";

        loadAdminData();

    } else {

        alert("Identifiant patron incorrect !");
    }
}

function addEntry() {

    let date = document.getElementById("date").value;
    let hours = document.getElementById("hours").value;

    let data = JSON.parse(localStorage.getItem(currentUser)) || [];

    data.push({ date, hours });

    localStorage.setItem(currentUser, JSON.stringify(data));

    loadData();
}

function resetForm() {

    document.getElementById("date").value = "";
    document.getElementById("hours").value = "";
}

function loadData() {

    let list = document.getElementById("list");

    list.innerHTML = "";

    let data =
    JSON.parse(localStorage.getItem(currentUser)) || [];

    data.forEach(e => {

        let li = document.createElement("li");

        li.innerText =
        e.date + " - " + e.hours + "h";

        list.appendChild(li);
    });
}

function loadAdminData() {

    let adminDiv =
    document.getElementById("adminData");

    adminDiv.innerHTML = "";

    for (let user in users) {

        let data =
        JSON.parse(localStorage.getItem(user)) || [];

        let total = 0;

        data.forEach(e => {
            total += Number(e.hours);
        });

        let box = document.createElement("div");

        box.innerHTML = `
            <h3>${user}</h3>
            <p>Total des heures : ${total}h</p>
            <hr>
        `;

        adminDiv.appendChild(box);
    }
}

</script>

</body>
</html>
