<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Style Pointage</title>

<meta name="theme-color" content="#FFD700">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

body {
    background: radial-gradient(circle at center, #151515 0%, #050505 100%);
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0;
}

.main {
    width: 100%;
    max-width: 500px;
    min-height: 100vh;
    background: rgba(15, 15, 15, 0.95);
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
}

/* Logo CSS Vectoriel */
.logo-container {
    width: 140px;
    height: 140px;
    background: #FFD700;
    border-radius: 50%;
    border: 5px solid #252525;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.3), inset 0 0 15px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin-bottom: 5px;
    position: relative;
}

.logo-ls {
    font-size: 58px;
    font-weight: 900;
    color: #000;
    line-height: 52px;
    letter-spacing: -3px;
    font-family: 'Arial Black', Impact, sans-serif;
    border-bottom: 4px solid #000;
    padding-bottom: 2px;
    width: 80%;
    text-align: center;
}

.logo-text {
    font-size: 11px;
    font-weight: 800;
    color: #000;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
}

.logo-sub {
    font-size: 6px;
    font-weight: 700;
    color: #000;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.signature {
    font-size: 11px;
    color: #FFD700;
    opacity: 0.6;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    font-weight: bold;
    text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
}

.subtitle {
    font-size: 14px;
    color: #aaa;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 30px;
    font-weight: 500;
}

.login-box {
    width: 100%;
}

input {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
    border: 1px solid rgba(255, 215, 0, 0.2);
    background: #1e1e1e;
    color: #fff;
    font-size: 16px;
    transition: all 0.3s ease;
}

input:focus {
    outline: none;
    border-color: #FFD700;
    box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #FFD700 0%, #cca300 100%);
    color: #000;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
}

button:active {
    transform: scale(0.98);
}

#btnAdmin {
    background: transparent;
    border: 1px solid #FFD700;
    color: #FFD700;
    box-shadow: none;
}

#employee, #admin {
    width: 100%;
    margin-top: 10px;
}

h2 {
    font-size: 22px;
    color: #fff;
    margin: 25px 0 15px 0;
    text-align: left;
    font-weight: 600;
    border-left: 4px solid #FFD700;
    padding-left: 10px;
}

.card {
    background: linear-gradient(145deg, #161616, #0f0f0f);
    border: 1px solid rgba(255, 215, 0, 0.1);
    border-radius: 20px;
    padding: 20px;
    margin-top: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    display: flex;
    justify-content: space-around;
}

.big {
    font-size: 16px;
    color: #aaa;
    text-align: center;
}

.big span {
    display: block;
    font-size: 26px;
    font-weight: 700;
    color: #FFD700;
    margin-top: 5px;
}

.action-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-top: 20px;
}

#btnStart {
    background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
    color: #fff;
    box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
}

#btnEnd {
    background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
    color: #fff;
    box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
}

.add-box {
    background: #111;
    border: 1px dashed #FFD700;
    border-radius: 15px;
    padding: 15px;
    margin-top: 20px;
}

#btnAddUser {
    background: #FFD700;
    color: #000;
    padding: 10px;
    font-size: 14px;
}

.btn-delete-worker {
    background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
    color: #fff;
    padding: 8px 12px;
    font-size: 12px;
    margin-top: 10px;
    border-radius: 8px;
    width: auto;
    display: inline-block;
    box-shadow: 0 2px 5px rgba(231, 76, 60, 0.2);
}

ul {
    list-style: none;
    width: 100%;
}

li {
    background: #161616;
    border-radius: 12px;
    padding: 15px;
    margin-top: 10px;
    font-size: 14px;
    border-left: 4px solid #FFD700;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.hist-info {
    color: #ccc;
    line-height: 1.4;
}

.hist-time {
    font-size: 16px;
    font-weight: 700;
    color: #FFD700;
    background: rgba(255, 215, 0, 0.1);
    padding: 6px 12px;
    border-radius: 8px;
}

#btnPDF {
    background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
    color: #fff;
    box-shadow: 0 4px 15px rgba(52, 73, 94, 0.3);
}

#btnReset {
    background: #c0392b;
    color: #fff;
}

/* Éléments pour la gestion Photo & Statuts */
.status-badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    display: inline-block;
}
.status-online { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
.status-offline { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }

.camera-preview-container {
    width: 100%;
    max-width: 200px;
    height: 150px;
    background: #222;
    margin: 15px auto;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid #FFD700;
    display: none;
    position: relative;
}
#video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* Effet miroir pour le selfie */
}

.employee-avatar {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    border: 2px solid #FFD700;
    object-fit: cover;
    background: #222;
}

@media print {
    body { background: #fff; color: #000; }
    .main { max-width: 100%; background: #fff; padding: 0; }
    button, input, .logo-container, .subtitle, .signature, .add-box, .btn-delete-worker, .camera-preview-container { display: none !important; }
    li { border: 1px solid #000; background: #fff; color: #000; }
    .hist-time { color: #000; background: none; }
    h2 { color: #000; border-left-color: #000; }
    .big span { color: #000; }
}
</style>
</head>
<body>

<div class="main">

    <!-- Logo Moderne Intégré en Code -->
    <div class="logo-container">
        <div class="logo-ls">LS</div>
        <div class="logo-text">Life Style</div>
        <div class="logo-sub">— Casual & Sport —</div>
    </div>
    
    <div class="signature">Created by Nazim</div>
    
    <div class="subtitle" id="subHeader">Système de pointage</div>

    <!-- Écran Login -->
    <div id="loginSection" class="login-box">
        <input id="user" placeholder="Nom d'utilisateur">
        <input id="pass" type="password" placeholder="Mot de passe">
        <button id="btnLogin">Connexion Employé</button>
        <button id="btnAdmin">Connexion Patron</button>
    </div>

    <!-- Écran Employé -->
    <div id="employee" style="display:none;">
        <h2 id="welcome">Bienvenue</h2>
        
        <div class="card">
            <div class="big">Heures Cumulées<span id="hours">0.00</span></div>
            <div class="big">Salaire Estimé<span id="salary">0</span> DA</div>
        </div>

        <!-- Fenêtre invisible/visible de prévisualisation de la caméra -->
        <div class="camera-preview-container" id="cameraBox">
            <video id="video" autoplay playsinline></video>
        </div>

        <div class="action-buttons">
            <button id="btnStart">📍 Entrée</button>
            <button id="btnEnd">🚪 Sortie</button>
        </div>

        <h2>Mon Historique</h2>
        <ul id="history"></ul>
        
        <button id="btnPDF">📄 Exporter Rapport RH</button>
    </div>

    <!-- Écran Admin -->
    <div id="admin" style="display:none;">
        <h2>Panel Patron</h2>
        
        <!-- Zone d'ajout d'un nouvel employé -->
        <div class="add-box">
            <h4 style="color:#FFD700; margin-bottom: 5px; text-align:left;">➕ Ajouter un Employé</h4>
            <input id="newWorkerName" placeholder="Nom de l'employé (ex: nazim)">
            <input id="newWorkerPass" placeholder="Mot de passe / Code">
            <button id="btnAddUser">Enregistrer l'employé</button>
        </div>

        <h2>Tableau de Bord & Présence en Direct</h2>
        <div id="adminData"></div>
        <button id="btnReset" style="margin-top: 30px;">🗑 Réinitialiser toutes les heures</button>
    </div>

</div>

<!-- Canvas caché pour capturer les photos en arrière-plan -->
<canvas id="canvas" style="display:none;" width="320" height="240"></canvas>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, get, child, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDtkWf9ns8COymh_kh8wJzwxODp-HQ3weI",
  authDomain: "lifestylepointage.firebaseapp.com",
  databaseURL: "https://lifestylepointage-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lifestylepointage",
  storageBucket: "lifestylepointage.firebasestorage.app",
  messagingSenderId: "816860536305",
  appId: "1:816860536305:web:a16078d630276470323850"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let users = {};
const adminUser = "Airouche";
const adminPass = "010167";
let current = "";
let streamFlux = null;

// Gestion des notifications de rappels
if ("Notification" in window) {
    if (Notification.permission !== "granted" && Notification.permission !== "denied") {
        Notification.requestPermission();
    }
}

setInterval(() => {
    let maintenant = new Date();
    if (maintenant.getSeconds() === 0) {
        if (maintenant.getHours() === 8 && maintenant.getMinutes() === 55) {
            envoyerNotification("📍 Rappel Life Style", "C'est l'heure ! N'oubliez pas de valider votre ENTRÉE.");
        }
        if (maintenant.getHours() === 20 && maintenant.getMinutes() === 55) {
            envoyerNotification("🚪 Rappel Life Style", "La journée se termine ! N'oubliez pas de valider votre SORTIE.");
        }
    }
}, 1000);

function envoyerNotification(titre, message) {
    if ("Notification" in window && Notification.permission === "granted") {
        new Notification(titre, { body: message });
    }
}

// Démarrer la caméra de l'employé au chargement de sa session
async function startCamera() {
    try {
        document.getElementById("cameraBox").style.display = "block";
        streamFlux = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
        document.getElementById("video").srcObject = streamFlux;
    } catch (err) {
        console.error("Impossible d'accéder à la caméra : ", err);
        alert("⚠️ Caméra requise pour le pointage. Veuillez autoriser l'accès.");
    }
}

// Éteindre la caméra pour économiser la batterie du téléphone
function stopCamera() {
    if (streamFlux) {
        streamFlux.getTracks().forEach(track => track.stop());
        document.getElementById("cameraBox").style.display = "none";
    }
}

// Prendre la photo et la convertir en texte Base64
function capturePhoto() {
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const context = canvas.getContext("2d");
    
    // Inversion de l'image (effet miroir pour que le selfie soit dans le bon sens)
    context.translate(canvas.width, 0);
    context.scale(-1, 1);
    
    context.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    // Remettre le canvas à l'endroit pour les prochaines captures
    context.setTransform(1, 0, 0, 1, 0, 0);
    
    return canvas.toDataURL("image/jpeg", 0.6); // Compression à 60% pour alléger Firebase
}

async function syncUsersList() {
  try {
    const snapshot = await get(ref(db, 'app_users/'));
    users = snapshot.exists() ? snapshot.val() : {};
  } catch (e) {
    console.error(e);
  }
}

async function login() {
  await syncUsersList();
  let u = document.getElementById("user").value.trim().toLowerCase();
  let p = document.getElementById("pass").value.trim();

  if (users[u] && users[u] == p) {
    current = u;
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("subHeader").style.display = "none";
    document.getElementById("employee").style.display = "block";
    document.getElementById("welcome").innerText = "Bonjour, " + u + " ✨";
    await load();
    await startCamera(); // On active la caméra directement
  } else {
    alert("Identifiants incorrects");
  }
}

async function admin() {
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pass").value.trim();

  if (u == adminUser && p == adminPass) {
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("subHeader").style.display = "none";
    document.getElementById("admin").style.display = "block";
    await loadAdmin();
  } else {
    alert("Accès Admin refusé");
  }
}

async function addNewEmployee() {
  let newName = document.getElementById("newWorkerName").value.trim().toLowerCase();
  let newPass = document.getElementById("newWorkerPass").value.trim();

  if(!newName || !newPass) return alert("Remplissez tous les champs");

  try {
    await set(ref(db, 'app_users/' + newName), newPass);
    document.getElementById("newWorkerName").value = "";
    document.getElementById("newWorkerPass").value = "";
    alert("Employé ajouté !");
    await loadAdmin();
  } catch(error) {
    alert("Erreur: " + error.message);
  }
}

window.deleteEmployee = async function(workerName) {
  if (confirm("Supprimer '" + workerName + "' définitivement ?")) {
    try {
      await remove(ref(db, 'app_users/' + workerName));
      await remove(ref(db, 'history/' + workerName));
      await remove(ref(db, 'starts/' + workerName));
      await remove(ref(db, 'last_photo/' + workerName));
      await loadAdmin();
    } catch (error) {
      alert(error.message);
    }
  }
}

async function start() {
  try {
    let photoData = capturePhoto(); // Capture photo d'entrée
    
    await set(ref(db, 'starts/' + current), Date.now());
    await set(ref(db, 'last_photo/' + current), photoData); // Stocke la photo d'entrée
    
    alert("⏱ Entrée validée avec photo !");
  } catch (error) {
    alert("Erreur : " + error.message);
  }
}

async function end() {
  try {
    const startSnapshot = await get(ref(db, 'starts/' + current));
    let s = startSnapshot.val();

    if (!s) return alert("❌ Pas de badge d'entrée valide trouvé.");

    let photoData = capturePhoto(); // Capture photo de sortie
    let startTime = new Date(parseInt(s));
    let endTime = new Date();
    let h = (endTime - startTime) / 3600000;

    const dataSnapshot = await get(ref(db, 'history/' + current));
    let data = dataSnapshot.val() || [];

    data.push({
      start: startTime.toLocaleString(),
      end: endTime.toLocaleString(),
      hours: h.toFixed(2)
    });

    await set(ref(db, 'history/' + current), data);
    await set(ref(db, 'last_photo/' + current), photoData); // Met à jour avec la photo de sortie
    await remove(ref(db, 'starts/' + current));

    alert("🚪 Sortie validée avec photo !");
    await load();
  } catch (error) {
    alert(error.message);
  }
}

async function load() {
  try {
    const snapshot = await get(ref(db, 'history/' + current));
    let data = snapshot.val() || [];
    let total = 0;
    let list = document.getElementById("history");
    list.innerHTML = "";

    data.forEach(e => {
      total += Number(e.hours);
      let li = document.createElement("li");
      li.innerHTML = `<div class="hist-info"><b>Du:</b> ${e.start}<br><b>Au:</b> ${e.end}</div><div class="hist-time">${e.hours} h</div>`;
      list.appendChild(li);
    });

    document.getElementById("hours").innerText = total.toFixed(2);
    document.getElementById("salary").innerText = (total * 100).toFixed(0);
  } catch (error) {
    console.error(error);
  }
}

async function loadAdmin() {
  try {
    await syncUsersList(); 
    let div = document.getElementById("adminData");
    div.innerHTML = "";

    if (Object.keys(users).length === 0) {
        div.innerHTML = "<p style='color:#aaa; font-style:italic;'>Aucun employé.</p>";
        return;
    }

    for (let u in users) {
      // 1. Calcul des heures
      const snapshotHist = await get(ref(db, 'history/' + u));
      let data = snapshotHist.val() || [];
      let total = 0;
      data.forEach(e => total += Number(e.hours));

      // 2. Vérification du statut en direct (S'il a un timestamp 'start', il est en poste)
      const snapshotStart = await get(ref(db, 'starts/' + u));
      let isInOffice = snapshotStart.exists();
      let badgeHTML = isInOffice 
        ? `<span class="status-badge status-online">🟢 En poste</span>` 
        : `<span class="status-badge status-offline">🔴 Parti</span>`;

      // 3. Récupération de sa dernière photo de pointage
      const snapshotPhoto = await get(ref(db, 'last_photo/' + u));
      let photoSrc = snapshotPhoto.exists() ? snapshotPhoto.val() : "https://cdn-icons-png.flaticon.com/512/847/847969.png";

      div.innerHTML += `
        <div class="card" style="align-items: center; justify-content: space-between; gap: 15px; text-align: left;">
          <!-- Photo de l'employé à son dernier clic -->
          <img src="${photoSrc}" class="employee-avatar" alt="Selfie">
          
          <div style="flex-grow: 1;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="color:#FFD700; text-transform:capitalize; display:inline-block;">👤 ${u}</h3>
                ${badgeHTML}
            </div>
            <p style="margin-top:5px; font-size:13px;"><b>Total :</b> ${total.toFixed(2)} h | <b>Salaire :</b> ${(total * 100).toFixed(0)} DA</p>
            <button class="btn-delete-worker" onclick="deleteEmployee('${u}')">❌ Licencier / Supprimer</button>
          </div>
        </div>
      `;
    }
  } catch (error) {
    console.error(error);
  }
}

async function reset() {
  if (confirm("Voulez-vous purger TOUTES les heures ?")) {
    try {
      for (let u in users) {
        await remove(ref(db, 'history/' + u));
        await remove(ref(db, 'starts/' + u));
        await remove(ref(db, 'last_photo/' + u));
      }
      await loadAdmin();
    } catch (error) {
      alert(error.message);
    }
  }
}

function exportPDF() { window.print(); }

syncUsersList();

document.getElementById("btnLogin").addEventListener("click", login);
document.getElementById("btnAdmin").addEventListener("click", admin);
document.getElementById("btnStart").addEventListener("click", start);
document.getElementById("btnEnd").addEventListener("click", end);
document.getElementById("btnReset").addEventListener("click", reset);
document.getElementById("btnPDF").addEventListener("click", exportPDF);
document.getElementById("btnAddUser").addEventListener("click", addNewEmployee);

</script>
</body>
</html>
