<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pointage Life Style</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }

    h1 {
      text-align: center;
      color: #222;
      margin-bottom: 30px;
    }

    .employee {
      background: white;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .employee h2 {
      margin: 0 0 15px;
      font-size: 22px;
    }

    .count {
      font-size: 28px;
      font-weight: bold;
      color: #007bff;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    .present {
      background: #28a745;
      color: white;
    }

    .reset {
      background: #dc3545;
      color: white;
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <h1>Pointage Life Style</h1>

  <div class="employee">
    <h2>Nazim : <span class="count" id="nazim">0</span></h2>
    <button class="present" onclick="addPoint('nazim')">
      Présent
    </button>
  </div>

  <div class="employee">
    <h2>Ilyes : <span class="count" id="ilyes">0</span></h2>
    <button class="present" onclick="addPoint('ilyes')">
      Présent
    </button>
  </div>

  <div class="employee">
    <h2>Alilou : <span class="count" id="alilou">0</span></h2>
    <button class="present" onclick="addPoint('alilou')">
      Présent
    </button>
  </div>

  <div class="employee">
    <h2>Anas : <span class="count" id="anas">0</span></h2>
    <button class="present" onclick="addPoint('anas')">
      Présent
    </button>
  </div>

  <button class="reset" onclick="resetAll()">
    Reset Tout
  </button>

  <script>
    let points = {
      nazim: 0,
      ilyes: 0,
      alilou: 0,
      anas: 0
    };

    function addPoint(name) {
      points[name]++;
      document.getElementById(name).innerText = points[name];

      localStorage.setItem("points", JSON.stringify(points));
    }

    function resetAll() {
      points = {
        nazim: 0,
        ilyes: 0,
        alilou: 0,
        anas: 0
      };

      for (let name in points) {
        document.getElementById(name).innerText = 0;
      }

      localStorage.setItem("points", JSON.stringify(points));
    }

    let saved = localStorage.getItem("points");

    if (saved) {
      points = JSON.parse(saved);

      for (let name in points) {
        document.getElementById(name).innerText = points[name];
      }
    }
  </script>

</body>
</html>
