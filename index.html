<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Style Pointage</title>

<meta name="theme-color" content="#FFD700">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

body {
    background: radial-gradient(circle at center, #151515 0%, #050505 100%);
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0;
}

.main {
    width: 100%;
    max-width: 500px;
    min-height: 100vh;
    background: rgba(15, 15, 15, 0.95);
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
}

/* Logo CSS Vectoriel */
.logo-container {
    width: 140px;
    height: 140px;
    background: #FFD700;
    border-radius: 50%;
    border: 5px solid #252525;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.3), inset 0 0 15px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin-bottom: 5px;
    position: relative;
}

.logo-ls {
    font-size: 58px;
    font-weight: 900;
    color: #000;
    line-height: 52px;
    letter-spacing: -3px;
    font-family: 'Arial Black', Impact, sans-serif;
    border-bottom: 4px solid #000;
    padding-bottom: 2px;
    width: 80%;
    text-align: center;
}

.logo-text {
    font-size: 11px;
    font-weight: 800;
    color: #000;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
}

.logo-sub {
    font-size: 6px;
    font-weight: 700;
    color: #000;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.signature {
    font-size: 11px;
    color: #FFD700;
    opacity: 0.6;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    font-weight: bold;
    text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
}

.subtitle {
    font-size: 14px;
    color: #aaa;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 30px;
    font-weight: 500;
}

.login-box {
    width: 100%;
}

input {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
    border: 1px solid rgba(255, 215, 0, 0.2);
    background: #1e1e1e;
    color: #fff;
    font-size: 16px;
    transition: all 0.3s ease;
}

input:focus {
    outline: none;
    border-color: #FFD700;
    box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #FFD700 0%, #cca300 100%);
    color: #000;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
}

button:active {
    transform: scale(0.98);
}

#btnAdmin {
    background: transparent;
    border: 1px solid #FFD700;
    color: #FFD700;
    box-shadow: none;
}

#employee, #admin {
    width: 100%;
    margin-top: 10px;
}

h2 {
    font-size: 22px;
    color: #fff;
    margin: 25px 0 15px 0;
    text-align: left;
    font-weight: 600;
    border-left: 4px solid #FFD700;
    padding-left: 10px;
}

.card {
    background: linear-gradient(145deg, #161616, #0f0f0f);
    border: 1px solid rgba(255, 215, 0, 0.1);
    border-radius: 20px;
    padding: 20px;
    margin-top: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    display: flex;
    justify-content: space-around;
}

.big {
    font-size: 16px;
    color: #aaa;
    text-align: center;
}

.big span {
    display: block;
    font-size: 26px;
    font-weight: 700;
    color: #FFD700;
    margin-top: 5px;
}

.action-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-top: 20px;
}

#btnStart {
    background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
    color: #fff;
    box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
}

#btnEnd {
    background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
    color: #fff;
    box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
}

.add-box {
    background: #111;
    border: 1px dashed #FFD700;
    border-radius: 15px;
    padding: 15px;
    margin-top: 20px;
}

#btnAddUser {
    background: #FFD700;
    color: #000;
    padding: 10px;
    font-size: 14px;
}

/* Bouton de suppression d'un employé */
.btn-delete-worker {
    background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
    color: #fff;
    padding: 8px 12px;
    font-size: 12px;
    margin-top: 10px;
    border-radius: 8px;
    width: auto;
    display: inline-block;
    box-shadow: 0 2px 5px rgba(231, 76, 60, 0.2);
}

ul {
    list-style: none;
    width: 100%;
}

li {
    background: #161616;
    border-radius: 12px;
    padding: 15px;
    margin-top: 10px;
    font-size: 14px;
    border-left: 4px solid #FFD700;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.hist-info {
    color: #ccc;
    line-height: 1.4;
}

.hist-time {
    font-size: 16px;
    font-weight: 700;
    color: #FFD700;
    background: rgba(255, 215, 0, 0.1);
    padding: 6px 12px;
    border-radius: 8px;
}

#btnPDF {
    background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
    color: #fff;
    box-shadow: 0 4px 15px rgba(52, 73, 94, 0.3);
}

#btnReset {
    background: #c0392b;
    color: #fff;
}

@media print {
    body { background: #fff; color: #000; }
    .main { max-width: 100%; background: #fff; padding: 0; }
    button, input, .logo-container, .subtitle, .signature, .add-box, .btn-delete-worker { display: none !important; }
    li { border: 1px solid #000; background: #fff; color: #000; }
    .hist-time { color: #000; background: none; }
    h2 { color: #000; border-left-color: #000; }
    .big span { color: #000; }
}
</style>
</head>
<body>

<div class="main">

    <div class="logo-container">
        <div class="logo-ls">LS</div>
        <div class="logo-text">Life Style</div>
        <div class="logo-sub">— Casual & Sport —</div>
    </div>
    
    <div class="signature">Created by Nazim bouda</div>
    
    <div class="subtitle" id="subHeader">Système de pointage</div>

    <div id="loginSection" class="login-box">
        <input id="user" placeholder="Nom d'utilisateur">
        <input id="pass" type="password" placeholder="Mot de passe">
        <button id="btnLogin">Connexion Employé</button>
        <button id="btnAdmin">Connexion Patron</button>
    </div>

    <div id="employee" style="display:none;">
        <h2 id="welcome">Bienvenue</h2>
        
        <div class="card">
            <div class="big">Heures Cumulées<span id="hours">0.00</span></div>
            <div class="big">Salaire Estimé<span id="salary">0</span> DA</div>
        </div>

        <div class="action-buttons">
            <button id="btnStart">📍 Entrée</button>
            <button id="btnEnd">🚪 Sortie</button>
        </div>

        <h2>Mon Historique</h2>
        <ul id="history"></ul>
        
        <button id="btnPDF">📄 Exporter Rapport RH</button>
    </div>

    <div id="admin" style="display:none;">
        <h2>Panel Patron</h2>
        
        <div class="add-box">
            <h4 style="color:#FFD700; margin-bottom: 5px; text-align:left;">➕ Ajouter un Employé</h4>
            <input id="newWorkerName" placeholder="Nom de l'employé (ex: nazim)">
            <input id="newWorkerPass" placeholder="Mot de passe / Code">
            <button id="btnAddUser">Enregistrer l'employé</button>
        </div>

        <h2>Liste des Employés & Heures</h2>
        <div id="adminData"></div>
        <button id="btnReset">🗑 Réinitialiser toutes les heures</button>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, get, child, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDtkWf9ns8COymh_kh8wJzwxODp-HQ3weI",
  authDomain: "lifestylepointage.firebaseapp.com",
  databaseURL: "https://lifestylepointage-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lifestylepointage",
  storageBucket: "lifestylepointage.firebasestorage.app",
  messagingSenderId: "816860536305",
  appId: "1:816860536305:web:a16078d630276470323850"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Plus d'utilisateurs écrits en dur ! Tout est stocké sur Firebase.
let users = {};

const adminUser = "Airouche";
const adminPass = "010167";

let current = "";

// Synchronisation dynamique des comptes depuis Firebase
async function syncUsersList() {
  try {
    const snapshot = await get(ref(db, 'app_users/'));
    if (snapshot.exists()) {
      users = snapshot.val();
    } else {
      users = {}; // Aucun utilisateur en base
    }
  } catch (e) {
    console.error("Erreur de synchronisation des comptes", e);
  }
}

async function login() {
  await syncUsersList();
  let u = document.getElementById("user").value.trim().toLowerCase();
  let p = document.getElementById("pass").value.trim();

  if (users[u] && users[u] == p) {
    current = u;
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("subHeader").style.display = "none";
    document.getElementById("employee").style.display = "block";
    document.getElementById("admin").style.display = "none";
    document.getElementById("welcome").innerText = "Bonjour, " + u + " ✨";
    await load();
  } else {
    alert("Identifiants incorrects ou compte inexistant");
  }
}

async function admin() {
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pass").value.trim();

  if (u == adminUser && p == adminPass) {
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("subHeader").style.display = "none";
    document.getElementById("admin").style.display = "block";
    document.getElementById("employee").style.display = "none";
    await loadAdmin();
  } else {
    alert("Accès Admin refusé");
  }
}

// Ajouter un employé dans Firebase
async function addNewEmployee() {
  let newName = document.getElementById("newWorkerName").value.trim().toLowerCase();
  let newPass = document.getElementById("newWorkerPass").value.trim();

  if(!newName || !newPass) {
    alert("Veuillez remplir le nom et le mot de passe.");
    return;
  }

  try {
    await set(ref(db, 'app_users/' + newName), newPass);
    
    document.getElementById("newWorkerName").value = "";
    document.getElementById("newWorkerPass").value = "";
    
    alert("Employé " + newName + " créé sur Firebase !");
    await loadAdmin();
  } catch(error) {
    alert("Erreur lors de l'ajout : " + error.message);
  }
}

// Supprimer un employé définitivement de Firebase (Bouton dynamique)
window.deleteEmployee = async function(workerName) {
  if (confirm("Supprimer définitivement l'employé '" + workerName + "' ainsi que ses données ?")) {
    try {
      await remove(ref(db, 'app_users/' + workerName));
      await remove(ref(db, 'history/' + workerName));
      await remove(ref(db, 'starts/' + workerName));
      alert("Employé supprimé.");
      await loadAdmin();
    } catch (error) {
      alert("Erreur lors de la suppression : " + error.message);
    }
  }
}

async function start() {
  try {
    await set(ref(db, 'starts/' + current), Date.now());
    alert("⏱ Entrée validée à " + new Date().toLocaleTimeString());
  } catch (error) {
    alert("Erreur Firebase : " + error.message);
  }
}

async function end() {
  try {
    const startSnapshot = await get(ref(db, 'starts/' + current));
    let s = startSnapshot.val();

    if (!s) {
      alert("❌ Vous n'avez pas validé d'entrée pour aujourd'hui.");
      return;
    }

    let startTime = new Date(parseInt(s));
    let endTime = new Date();
    let h = (endTime - startTime) / 3600000;

    const dataSnapshot = await get(ref(db, 'history/' + current));
    let data = dataSnapshot.val() || [];

    data.push({
      start: startTime.toLocaleString(),
      end: endTime.toLocaleString(),
      hours: h.toFixed(2)
    });

    await set(ref(db, 'history/' + current), data);
    await remove(ref(db, 'starts/' + current));

    alert("🚪 Sortie enregistrée avec succès !");
    await load();
  } catch (error) {
    alert("Erreur : " + error.message);
  }
}

async function load() {
  try {
    const snapshot = await get(ref(db, 'history/' + current));
    let data = snapshot.val() || [];

    let total = 0;
    let list = document.getElementById("history");
    list.innerHTML = "";

    data.forEach(e => {
      total += Number(e.hours);
      let li = document.createElement("li");
      li.innerHTML = `
        <div class="hist-info">
            <b>Du:</b> ${e.start}<br>
            <b>Au:</b> ${e.end}
        </div>
        <div class="hist-time">${e.hours} h</div>
      `;
      list.appendChild(li);
    });

    document.getElementById("hours").innerText = total.toFixed(2);
    document.getElementById("salary").innerText = (total * 100).toFixed(0);
  } catch (error) {
    console.error(error);
  }
}

async function loadAdmin() {
  try {
    await syncUsersList(); 
    let div = document.getElementById("adminData");
    div.innerHTML = "";

    // Si aucun employé n'existe encore sur Firebase
    if (Object.keys(users).length === 0) {
        div.innerHTML = "<p style='color:#aaa; font-style:italic; margin-top:15px;'>Aucun employé créé pour le moment.</p>";
        return;
    }

    for (let u in users) {
      const snapshot = await get(ref(db, 'history/' + u));
      let data = snapshot.val() || [];

      let total = 0;
      data.forEach(e => {
        total += Number(e.hours);
      });

      div.innerHTML += `
        <div class="card" style="flex-direction:column; text-align:left; gap:5px; position:relative;">
          <h3 style="color:#FFD700; text-transform:capitalize;">👤 ${u}</h3>
          <p style="margin-top:5px;"><b>Total Heures :</b> ${total.toFixed(2)} h</p>
          <p><b>Salaire dû :</b> ${(total * 100).toFixed(0)} DA</p>
          <button class="btn-delete-worker" onclick="deleteEmployee('${u}')">❌ Supprimer l'employé</button>
        </div>
      `;
    }
  } catch (error) {
    console.error(error);
  }
}

async function reset() {
  if (confirm("Attention ! Voulez-vous vraiment purger TOUTES les heures de pointage ?")) {
    try {
      for (let u in users) {
        await remove(ref(db, 'history/' + u));
        await remove(ref(db, 'starts/' + u));
      }
      await loadAdmin();
      alert("Toutes les heures ont été réinitialisées.");
    } catch (error) {
      alert("Erreur lors du reset : " + error.message);
    }
  }
}

function exportPDF() {
    window.print();
}

// Initialisation au lancement
syncUsersList();

document.getElementById("btnLogin").addEventListener("click", login);
document.getElementById("btnAdmin").addEventListener("click", admin);
document.getElementById("btnStart").addEventListener("click", start);
document.getElementById("btnEnd").addEventListener("click", end);
document.getElementById("btnReset").addEventListener("click", reset);
document.getElementById("btnPDF").addEventListener("click", exportPDF);
document.getElementById("btnAddUser").addEventListener("click", addNewEmployee);

</script>
</body>
</html>
