<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Style Pointage</title>

<meta name="theme-color" content="#FFD700">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

body {
    background: radial-gradient(circle at center, #151515 0%, #050505 100%);
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0;
}

.main {
    width: 100%;
    max-width: 500px;
    min-height: 100vh;
    background: rgba(15, 15, 15, 0.95);
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
}

/* Logo CSS Vectoriel */
.logo-container {
    width: 140px;
    height: 140px;
    background: #FFD700;
    border-radius: 50%;
    border: 5px solid #252525;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.3), inset 0 0 15px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin-bottom: 5px;
    position: relative;
}

.logo-ls {
    font-size: 58px;
    font-weight: 900;
    color: #000;
    line-height: 52px;
    letter-spacing: -3px;
    font-family: 'Arial Black', Impact, sans-serif;
    border-bottom: 4px solid #000;
    padding-bottom: 2px;
    width: 80%;
    text-align: center;
}

.logo-text {
    font-size: 11px;
    font-weight: 800;
    color: #000;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
}

.logo-sub {
    font-size: 6px;
    font-weight: 700;
    color: #000;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.signature {
    font-size: 11px;
    color: #FFD700;
    opacity: 0.6;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    font-weight: bold;
    text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
}

.subtitle {
    font-size: 14px;
    color: #aaa;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 30px;
    font-weight: 500;
}

.login-box {
    width: 100%;
}

input {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
    border: 1px solid rgba(255, 215, 0, 0.2);
    background: #1e1e1e;
    color: #fff;
    font-size: 16px;
    transition: all 0.3s ease;
}

input:focus {
    outline: none;
    border-color: #FFD700;
    box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #FFD700 0%, #cca300 100%);
    color: #000;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
}

button:active {
    transform: scale(0.98);
}

#btnAdmin {
    background: transparent;
    border: 1px solid #FFD700;
    color: #FFD700;
    box-shadow: none;
}

#employee, #admin {
    width: 100%;
    margin-top: 10px;
}

h2 {
    font-size: 22px;
    color: #fff;
    margin: 25px 0 15px 0;
    text-align: left;
    font-weight: 600;
    border-left: 4px solid #FFD700;
    padding-left: 10px;
}

.card {
    background: linear-gradient(145deg, #161616, #0f0f0f);
    border: 1px solid rgba(255, 215, 0, 0.1);
    border-radius: 20px;
    padding: 20px;
    margin-top: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    display: flex;
    justify-content: space-around;
}

.big {
    font-size: 16px;
    color: #aaa;
    text-align: center;
}

.big span {
    display: block;
    font-size: 26px;
    font-weight: 700;
    color: #FFD700;
    margin-top: 5px;
}

.action-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-top: 20px;
}

#btnStart {
    background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
    color: #fff;
    box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
}

#btnEnd {
    background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
    color: #fff;
    box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
}

.add-box {
    background: #111;
    border: 1px dashed #FFD700;
    border-radius: 15px;
    padding: 15px;
    margin-top: 20px;
}

#btnAddUser {
    background: #FFD700;
    color: #000;
    padding: 10px;
    font-size: 14px;
}

.btn-file-label {
    display: block;
    text-align: center;
    background: #222;
    border: 1px solid rgba(255, 215, 0, 0.4);
    color: #FFD700;
    padding: 10px;
    border-radius: 8px;
    margin-top: 12px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
}

.btn-inline {
    background: #222;
    border: 1px solid #FFD700;
    color: #FFD700;
    padding: 5px 10px;
    font-size: 11px;
    border-radius: 6px;
    width: auto;
    display: inline-block;
    margin-top: 5px;
    box-shadow: none;
}

.btn-delete-worker {
    background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
    color: #fff;
    padding: 8px 12px;
    font-size: 12px;
    margin-top: 10px;
    border-radius: 8px;
    width: auto;
    display: inline-block;
    box-shadow: 0 2px 5px rgba(231, 76, 60, 0.2);
}

ul {
    list-style: none;
    width: 100%;
}

li {
    background: #161616;
    border-radius: 12px;
    padding: 15px;
    margin-top: 10px;
    font-size: 14px;
    border-left: 4px solid #FFD700;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.hist-info {
    color: #ccc;
    line-height: 1.4;
}

.hist-time {
    font-size: 16px;
    font-weight: 700;
    color: #FFD700;
    background: rgba(255, 215, 0, 0.1);
    padding: 6px 12px;
    border-radius: 8px;
}

#btnPDF {
    background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
    color: #fff;
    box-shadow: 0 4px 15px rgba(52, 73, 94, 0.3);
}

#btnReset {
    background: #c0392b;
    color: #fff;
}

/* Statuts et photos de profil */
.status-badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    display: inline-block;
}
.status-online { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
.status-offline { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }

.employee-profile-box {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 15px 0;
    background: rgba(255, 215, 0, 0.05);
    padding: 12px;
    border-radius: 15px;
    border: 1px solid rgba(255, 215, 0, 0.1);
    width: 100%;
}

.employee-avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid #FFD700;
    object-fit: cover;
    background: #222;
}

.alert-banner {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    margin-top: 15px;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    display: none;
    animation: fadeIn 0.4s ease-in-out;
}
.alert-success { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border: 1px solid #2ecc71; }
.alert-danger { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border: 1px solid #e74c3c; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

@media print {
    body { background: #fff; color: #000; }
    .main { max-width: 100%; background: #fff; padding: 0; }
    button, input, .logo-container, .subtitle, .signature, .add-box, .btn-delete-worker, .alert-banner, .btn-file-label, .btn-inline { display: none !important; }
    li { border: 1px solid #000; background: #fff; color: #000; }
    .hist-time { color: #000; background: none; }
    h2 { color: #000; border-left-color: #000; }
    .big span { color: #000; }
}
</style>
</head>
<body>

<div class="main">

    <div class="logo-container">
        <div class="logo-ls">LS</div>
        <div class="logo-text">Life Style</div>
        <div class="logo-sub">— Casual & Sport —</div>
    </div>
    
    <div class="signature">Created by Nazim</div>
    <div class="subtitle" id="subHeader">Système de pointage</div>

    <!-- Écran Login -->
    <div id="loginSection" class="login-box">
        <input id="user" placeholder="Nom d'utilisateur">
        <input id="pass" type="password" placeholder="Mot de passe">
        <button id="btnLogin">Connexion Employé</button>
        <button id="btnAdmin">Connexion Patron</button>
    </div>

    <!-- Écran Employé -->
    <div id="employee" style="display:none;">
        <div class="employee-profile-box">
            <img src="" id="userAvatar" class="employee-avatar" alt="Profil">
            <h2 id="welcome" style="margin:0; border:none; padding:0;">Bienvenue</h2>
        </div>
        
        <div class="card">
            <div class="big">Heures Cumulées<span id="hours">0.00</span></div>
            <div class="big">Salaire Estimé<span id="salary">0</span> DA</div>
        </div>

        <div id="actionAlert" class="alert-banner"></div>

        <div class="action-buttons">
            <button id="btnStart">📍 Entrée</button>
            <button id="btnEnd">🚪 Sortie</button>
        </div>

        <h2>Mon Historique</h2>
        <ul id="history"></ul>
        <button id="btnPDF">📄 Exporter Rapport RH</button>
    </div>

    <!-- Écran Admin -->
    <div id="admin" style="display:none;">
        <h2>Panel Patron</h2>
        
        <div class="add-box">
            <h4 style="color:#FFD700; margin-bottom: 5px; text-align:left;">➕ Ajouter un Employé</h4>
            <input id="newWorkerName" placeholder="Nom de l'employé (ex: nazim)">
            <input id="newWorkerPass" placeholder="Mot de passe / Code">
            
            <label for="newWorkerPhoto" class="btn-file-label">📸 Sélectionner une photo de profil</label>
            <input type="file" id="newWorkerPhoto" accept="image/*" style="display:none;">
            <div id="photoCheckMark" style="color:#2ecc71; font-size:12px; margin-top:5px; text-align:center; display:none;">✓ Photo chargée</div>
            
            <button id="btnAddUser">Enregistrer l'employé</button>
        </div>

        <h2>Tableau de Bord & Présence en Direct</h2>
        <!-- Input caché pour la mise à jour des employés existants -->
        <input type="file" id="updateWorkerPhoto" accept="image/*" style="display:none;">
        <div id="adminData"></div>
        <button id="btnReset" style="margin-top: 30px;">🗑 Réinitialiser toutes les heures</button>
    </div>

</div>

<!-- Canvas caché utilisé pour compresser les photos afin d'économiser l'espace Firebase -->
<canvas id="compressCanvas" style="display:none;" width="150" height="150"></canvas>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDtkWf9ns8COymh_kh8wJzwxODp-HQ3weI",
  authDomain: "lifestylepointage.firebaseapp.com",
  databaseURL: "https://lifestylepointage-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lifestylepointage",
  storageBucket: "lifestylepointage.firebasestorage.app",
  messagingSenderId: "816860536305",
  appId: "1:816860536305:web:a16078d630276470323850"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let users = {};
const adminUser = "Airouche";
const adminPass = "010167";
let current = "";
let tempPhotoBase64 = "";
let workerToUpdatePhoto = "";

if ("Notification" in window) {
    if (Notification.permission !== "granted" && Notification.permission !== "denied") {
        Notification.requestPermission();
    }
}

setInterval(() => {
    let maintenant = new Date();
    if (maintenant.getSeconds() === 0) {
        if (maintenant.getHours() === 8 && maintenant.getMinutes() === 55) {
            envoyerNotification("📍 Rappel Life Style", "C'est l'heure ! N'oubliez pas de valider votre ENTRÉE.");
        }
        if (maintenant.getHours() === 20 && maintenant.getMinutes() === 55) {
            envoyerNotification("🚪 Rappel Life Style", "La journée se termine ! N'oubliez pas de valider votre SORTIE.");
        }
    }
}, 1000);

function envoyerNotification(titre, message) {
    if ("Notification" in window && Notification.permission === "granted") {
        new Notification(titre, { body: message });
    }
}

function afficherAlerteEcran(message, type) {
    const banner = document.getElementById("actionAlert");
    banner.innerText = message;
    banner.className = "alert-banner " + (type === "success" ? "alert-success" : "alert-danger");
    banner.style.display = "block";
    setTimeout(() => { banner.style.display = "none"; }, 6000);
}

// Compresse l'image pour éviter de saturer Firebase Database
function compresserImage(file, callback) {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = function (event) {
        const img = new Image();
        img.src = event.target.result;
        img.onload = function () {
            const canvas = document.getElementById("compressCanvas");
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, 150, 150);
            callback(canvas.toDataURL("image/jpeg", 0.7)); // Qualité 70%
        };
    };
}

// Écouteur pour la création d'un nouvel employé
document.getElementById("newWorkerPhoto").addEventListener("change", function(e) {
    if(e.target.files.length > 0) {
        compresserImage(e.target.files[0], function(base64Data) {
            tempPhotoBase64 = base64Data;
            document.getElementById("photoCheckMark").style.display = "block";
        });
    }
});

// Écouteur pour la mise à jour d'un employé existant
document.getElementById("updateWorkerPhoto").addEventListener("change", function(e) {
    if(e.target.files.length > 0 && workerToUpdatePhoto !== "") {
        compresserImage(e.target.files[0], async function(base64Data) {
            try {
                await set(ref(db, 'avatars/' + workerToUpdatePhoto), base64Data);
                alert("Photo de profil mise à jour avec succès !");
                workerToUpdatePhoto = "";
                await loadAdmin();
            } catch(err) {
                alert("Erreur lors de la mise à jour : " + err.message);
            }
        });
    }
});

async function syncUsersList() {
  try {
    const snapshot = await get(ref(db, 'app_users/'));
    users = snapshot.exists() ? snapshot.val() : {};
  } catch (e) {
    console.error(e);
  }
}

async function login() {
  await syncUsersList();
  let u = document.getElementById("user").value.trim().toLowerCase();
  let p = document.getElementById("pass").value.trim();

  if (users[u] && users[u] == p) {
    current = u;
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("subHeader").style.display = "none";
    document.getElementById("employee").style.display = "block";
    document.getElementById("welcome").innerText = "Bonjour, " + u + " ✨";
    
    // Charger la photo de profil de l'employé
    const snapshotAvatar = await get(ref(db, 'avatars/' + u));
    document.getElementById("userAvatar").src = snapshotAvatar.exists() 
        ? snapshotAvatar.val() 
        : "https://api.dicebear.com/7.x/initials/svg?seed=" + u + "&backgroundColor=ffd700&color=000000";

    await load();
  } else {
    alert("Identifiants incorrects");
  }
}

async function admin() {
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pass").value.trim();

  if (u == adminUser && p == adminPass) {
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("subHeader").style.display = "none";
    document.getElementById("admin").style.display = "block";
    await loadAdmin();
  } else {
    alert("Accès Admin refusé");
  }
}

async function addNewEmployee() {
  let newName = document.getElementById("newWorkerName").value.trim().toLowerCase();
  let newPass = document.getElementById("newWorkerPass").value.trim();

  if(!newName || !newPass) return alert("Remplissez tous les champs");

  try {
    await set(ref(db, 'app_users/' + newName), newPass);
    
    // Si une photo a été choisie, on l'enregistre
    if(tempPhotoBase64 !== "") {
        await set(ref(db, 'avatars/' + newName), tempPhotoBase64);
    }

    document.getElementById("newWorkerName").value = "";
    document.getElementById("newWorkerPass").value = "";
    document.getElementById("photoCheckMark").style.display = "none";
    tempPhotoBase64 = "";
    
    alert("Employé ajouté avec succès !");
    await loadAdmin();
  } catch(error) {
    alert("Erreur: " + error.message);
  }
}

window.triggerUpdatePhoto = function(workerName) {
    workerToUpdatePhoto = workerName;
    document.getElementById("updateWorkerPhoto").click();
}

window.deleteEmployee = async function(workerName) {
  if (confirm("Supprimer '" + workerName + "' définitivement ?")) {
    try {
      await remove(ref(db, 'app_users/' + workerName));
      await remove(ref(db, 'history/' + workerName));
      await remove(ref(db, 'starts/' + workerName));
      await remove(ref(db, 'avatars/' + workerName));
      await loadAdmin();
    } catch (error) {
      alert(error.message);
    }
  }
}

async function start() {
  try {
    await set(ref(db, 'starts/' + current), Date.now());
    envoyerNotification("📍 Pointage Enregistré", "Votre entrée a bien été validée.");
    afficherAlerteEcran("✅ Entrée validée avec succès ! Bon travail.", "success");
  } catch (error) {
    afficherAlerteEcran("❌ Erreur : " + error.message, "danger");
  }
}

async function end() {
  try {
    const startSnapshot = await get(ref(db, 'starts/' + current));
    let s = startSnapshot.val();

    if (!s) {
        afficherAlerteEcran("❌ Erreur : Pas de badge d'entrée trouvé.", "danger");
        return;
    }

    let startTime = new Date(parseInt(s));
    let endTime = new Date();
    let h = (endTime - startTime) / 3600000;

    const dataSnapshot = await get(ref(db, 'history/' + current));
    let data = dataSnapshot.val() || [];

    data.push({
      start: startTime.toLocaleString(),
      end: endTime.toLocaleString(),
      hours: h.toFixed(2)
    });

    await set(ref(db, 'history/' + current), data);
    await remove(ref(db, 'starts/' + current));

    envoyerNotification("🚪 Pointage Enregistré", "Votre sortie a bien été validée. Bonne soirée !");
    afficherAlerteEcran("✅ Sortie validée ! Session enregistrée dans l'historique.", "success");
    await load();
  } catch (error) {
    afficherAlerteEcran("❌ Erreur : " + error.message, "danger");
  }
}

async function load() {
  try {
    const snapshot = await get(ref(db, 'history/' + current));
    let data = snapshot.val() || [];
    let total = 0;
    let list = document.getElementById("history");
    list.innerHTML = "";

    data.forEach(e => {
      total += Number(e.hours);
      let li = document.createElement("li");
      li.innerHTML = `<div class="hist-info"><b>Du:</b> ${e.start}<br><b>Au:</b> ${e.end}</div><div class="hist-time">${e.hours} h</div>`;
      list.appendChild(li);
    });

    document.getElementById("hours").innerText = total.toFixed(2);
    document.getElementById("salary").innerText = (total * 100).toFixed(0);
  } catch (error) {
    console.error(error);
  }
}

async function loadAdmin() {
  try {
    await syncUsersList(); 
    let div = document.getElementById("adminData");
    div.innerHTML = "";

    if (Object.keys(users).length === 0) {
        div.innerHTML = "<p style='color:#aaa; font-style:italic;'>Aucun employé.</p>";
        return;
    }

    for (let u in users) {
      const snapshotHist = await get(ref(db, 'history/' + u));
      let data = snapshotHist.val() || [];
      let total = 0;
      data.forEach(e => total += Number(e.hours));

      const snapshotStart = await get(ref(db, 'starts/' + u));
      let isInOffice = snapshotStart.exists();
      let badgeHTML = isInOffice 
        ? `<span class="status-badge status-online">🟢 En poste</span>` 
        : `<span class="status-badge status-offline">🔴 Parti</span>`;

      // Charge la photo réelle ou l'avatar par défaut avec les initiales
      const snapshotAvatar = await get(ref(db, 'avatars/' + u));
      let avatarSrc = snapshotAvatar.exists() 
        ? snapshotAvatar.val() 
        : "https://api.dicebear.com/7.x/initials/svg?seed=" + u + "&backgroundColor=ffd700&color=000000";

      div.innerHTML += `
        <div class="card" style="align-items: center; justify-content: space-between; gap: 15px; text-align: left;">
          <div style="text-align: center;">
             <img src="${avatarSrc}" class="employee-avatar" alt="Avatar"><br>
             <button class="btn-inline" onclick="triggerUpdatePhoto('${u}')">📸 Changer</button>
          </div>
          
          <div style="flex-grow: 1;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="color:#FFD700; text-transform:capitalize; display:inline-block;">👤 ${u}</h3>
                ${badgeHTML}
            </div>
            <p style="margin-top:5px; font-size:13px;"><b>Total :</b> ${total.toFixed(2)} h | <b>Salaire :</b> ${(total * 100).toFixed(0)} DA</p>
            <button class="btn-delete-worker" onclick="deleteEmployee('${u}')">❌ Licencier / Supprimer</button>
          </div>
        </div>
      `;
    }
  } catch (error) {
    console.error(error);
  }
}

async function reset() {
  if (confirm("Voulez-vous purger TOUTES les heures ?")) {
    try {
      for (let u in users) {
        await remove(ref(db, 'history/' + u));
        await remove(ref(db, 'starts/' + u));
      }
      await loadAdmin();
    } catch (error) {
      alert(error.message);
    }
  }
}

function exportPDF() { window.print(); }
